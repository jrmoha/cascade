services:
  # ─── Write-side stores ────────────────────────────────────────────────────

  cassandra:
    image: cassandra:4.1
    container_name: cascade-cassandra
    ports:
      - '9042:9042'
    environment:
      CASSANDRA_CLUSTER_NAME: cascade-local
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: ['CMD-SHELL', "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    volumes:
      - cassandra-data:/var/lib/cassandra

  # Two listeners (per CLAUDE.md):
  #   PLAINTEXT://kafka:29092   — inter-container (service-to-service)
  #   EXTERNAL://localhost:9092 — host tooling (kafka-topics.sh, kcat, etc.)
  kafka:
    image: bitnami/kafka:3.7
    container_name: cascade-kafka
    ports:
      - '9092:9092'
    environment:
      KAFKA_CFG_NODE_ID: '1'
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: '1'
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: '1'
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: '1'
    healthcheck:
      test: ['CMD-SHELL', 'kafka-broker-api-versions.sh --bootstrap-server localhost:9092']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Read-side stores ─────────────────────────────────────────────────────

  redis:
    image: redis:7.2-alpine
    container_name: cascade-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    container_name: cascade-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: cascade
      POSTGRES_USER: cascade
      POSTGRES_PASSWORD: cascade
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cascade -d cascade']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  cassandra-data:
  postgres-data:
