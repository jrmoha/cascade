# Shared env for all three Cassandra nodes (top-level extension field so it is
# an anchor, not a service). Per-node CASSANDRA_BROADCAST_ADDRESS (the container's
# own service name) is added per service — with rpc_address defaulting to the
# 0.0.0.0 wildcard, Cassandra requires a concrete broadcast_rpc_address, which the
# image derives from it.
x-cassandra-env: &cassandra-env
  CASSANDRA_CLUSTER_NAME: cascade-local
  CASSANDRA_DC: datacenter1
  CASSANDRA_RACK: rack1
  CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
  CASSANDRA_SEEDS: cassandra-1
  MAX_HEAP_SIZE: 512M
  HEAP_NEWSIZE: 128M

# Shared env for all three Kafka brokers (KAN-40, ADR-0020). KRaft "combined"
# mode: every node is both broker and controller, forming a 3-voter metadata
# quorum. RF=3 defaults + min.insync.replicas=2 so acks=all survives one broker
# down (the Kafka parallel to Cassandra RF=3/QUORUM). Auto-create is OFF — topics
# are provisioned explicitly by the kafka-init one-shot (never a 1-partition
# accident). Per-broker KAFKA_NODE_ID + listeners are set on each service.
x-kafka-env: &kafka-env
  KAFKA_PROCESS_ROLES: broker,controller
  KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
  KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: '3'
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: '3'
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: '2'
  KAFKA_DEFAULT_REPLICATION_FACTOR: '3'
  KAFKA_MIN_INSYNC_REPLICAS: '2'
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: '0'
  CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

services:
  # --- Cassandra: 3-node cluster (KAN-38, ADR-0019) -------------------------
  # One datacenter (datacenter1), RF=3 so the keyspace survives one node down
  # and reads/writes at LOCAL_QUORUM stay available. cassandra-1 is the seed;
  # 2 and 3 wait for it to be healthy before joining so the ring forms cleanly
  # (bootstrapping nodes in parallel against an unformed ring is racy). Heap is
  # trimmed per node to fit three on a dev machine. Use GossipingPropertyFileSnitch
  # so the DC/rack are honoured (SimpleSnitch would ignore CASSANDRA_DC).
  cassandra-1:
    image: cassandra:4.1
    container_name: cascade-cassandra-1
    restart: on-failure
    ports:
      - '9042:9042'
    environment:
      <<: *cassandra-env
      CASSANDRA_BROADCAST_ADDRESS: cassandra-1
    healthcheck:
      test: ['CMD-SHELL', "nodetool status | grep -E '^UN' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 90s
    volumes:
      - cassandra-1-data:/var/lib/cassandra

  cassandra-2:
    image: cassandra:4.1
    container_name: cascade-cassandra-2
    restart: on-failure
    environment:
      <<: *cassandra-env
      CASSANDRA_BROADCAST_ADDRESS: cassandra-2
    healthcheck:
      test: ['CMD-SHELL', "nodetool status | grep -E '^UN' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 120s
    depends_on:
      cassandra-1:
        condition: service_healthy
    volumes:
      - cassandra-2-data:/var/lib/cassandra

  cassandra-3:
    image: cassandra:4.1
    container_name: cascade-cassandra-3
    restart: on-failure
    environment:
      <<: *cassandra-env
      CASSANDRA_BROADCAST_ADDRESS: cassandra-3
    healthcheck:
      test: ['CMD-SHELL', "nodetool status | grep -E '^UN' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 150s
    depends_on:
      cassandra-2:
        condition: service_healthy
    volumes:
      - cassandra-3-data:/var/lib/cassandra

  # --- Kafka: 3-broker KRaft cluster (KAN-40, ADR-0020) ---------------------
  # Each broker exposes two client listeners (per CLAUDE.md):
  #   PLAINTEXT://kafka-N:29092         — inter-container (service-to-service)
  #   PLAINTEXT_HOST://localhost:<port> — host tooling (kafka-topics.sh, kcat)
  # Host ports differ per broker (9092/9094/9095) to avoid collisions. Brokers do
  # NOT depend_on each other (that would deadlock the quorum) — they discover via
  # KAFKA_CONTROLLER_QUORUM_VOTERS and form the ring in parallel.
  kafka-1:
    image: apache/kafka:3.7.0
    container_name: cascade-kafka-1
    ports:
      - '9092:9092'
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: '1'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092',
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  kafka-2:
    image: apache/kafka:3.7.0
    container_name: cascade-kafka-2
    ports:
      - '9094:9094'
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: '2'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29092,PLAINTEXT_HOST://localhost:9094
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092',
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  kafka-3:
    image: apache/kafka:3.7.0
    container_name: cascade-kafka-3
    ports:
      - '9095:9095'
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: '3'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:29092,PLAINTEXT_HOST://localhost:9095
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092',
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # One-shot: provision topics explicitly (auto-create is off). Idempotent
  # (--if-not-exists), exits 0 — app services gate on service_completed_successfully.
  # Topic names mirror @cascade/contracts (RAW_EVENTS_TOPIC / RAW_EVENTS_DLQ_TOPIC);
  # shell can't import them, so they're literals here (the one sanctioned exception,
  # like any kafka-topics CLI call). raw-events: 6 partitions (parallelism headroom);
  # raw-events.dlq: 3 (low volume). Both RF=3.
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: cascade-kafka-init
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    entrypoint: ['/bin/bash', '-c']
    command:
      - |
        set -euo pipefail
        BIN=/opt/kafka/bin
        BS=kafka-1:29092
        $$BIN/kafka-topics.sh --bootstrap-server $$BS --create --if-not-exists \
          --topic raw-events --partitions 6 --replication-factor 3
        $$BIN/kafka-topics.sh --bootstrap-server $$BS --create --if-not-exists \
          --topic raw-events.dlq --partitions 3 --replication-factor 3
        echo "== topics provisioned =="
        $$BIN/kafka-topics.sh --bootstrap-server $$BS --describe --topic raw-events

  # Web UI for browsing topics, messages, and consumer groups at http://localhost:8080.
  # Connects over the internal listeners (kafka-N:29092), not the host ports.
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: cascade-kafka-ui
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: cascade-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      DYNAMIC_CONFIG_ENABLED: 'true'
    depends_on:
      kafka-1:
        condition: service_healthy

  redis:
    image: redis:7.2-alpine
    container_name: cascade-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    container_name: cascade-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: cascade
      POSTGRES_USER: cascade
      POSTGRES_PASSWORD: cascade
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cascade -d cascade']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # --- Application services -------------------------------------------------
  # Gated behind the `apps` profile so `make up` / `docker compose up` brings up
  # only the backing stores (the workflow tests/smoke rely on). Bring up the
  # full stack with `make stack-up` (or `docker compose --profile apps up`).
  # Each builds from the repo root (context: ..) so @cascade/contracts resolves.
  # Peer addresses use container service names (kafka-1:29092, cassandra) — never
  # hardcoded in source. Stopping one app container leaves the others running.
  # The Ingestion-Processor and Aggregator are scalable (no container_name/host
  # port) — `make stack-scale` runs multiple replicas per consumer group (KAN-40).

  collector:
    build:
      context: ..
      dockerfile: services/collector/Dockerfile
    container_name: cascade-collector
    profiles: ['apps']
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: '3001'
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      # Ingest hot-path cache + the Project/Schema gRPC dependency (KAN-30).
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      PROJECT_SCHEMA_GRPC_URL: project-schema:50051
      PROJECT_SCHEMA_CACHE_TTL_SECONDS: '30'
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      project-schema:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3001/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Horizontally scalable consumer (KAN-40): no container_name / host-port binding
  # so `docker compose up --scale ingestion-processor=N` runs N replicas in the one
  # `cascade-ingestion-processor` group; partitions distribute across them. Probes
  # bind localhost inside each container, so no host port is needed.
  ingestion-processor:
    build:
      context: ..
      dockerfile: services/ingestion-processor/Dockerfile
    profiles: ['apps']
    environment:
      NODE_ENV: production
      PORT: '3003'
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      CASSANDRA_CONTACT_POINTS: cassandra-1,cassandra-2,cassandra-3
      CASSANDRA_PORT: '9042'
      CASSANDRA_LOCAL_DC: datacenter1
      CASSANDRA_REPLICATION_FACTOR: '3'
      CASSANDRA_CONSISTENCY: local_quorum
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      cassandra-3:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3003/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  project-schema:
    build:
      context: ..
      dockerfile: services/project-schema/Dockerfile
    container_name: cascade-project-schema
    profiles: ['apps']
    ports:
      - '3004:3004'
      # gRPC sync contract (Collector → Project/Schema, KAN-29/30).
      - '50051:50051'
    environment:
      NODE_ENV: production
      PORT: '3004'
      # Bind the gRPC server on all interfaces so peers reach it by service name.
      GRPC_URL: '0.0.0.0:50051'
      # Prisma reads DATABASE_URL directly; use the postgres service name.
      DATABASE_URL: postgresql://cascade:cascade@postgres:5432/cascade
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3004/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  query-api:
    build:
      context: ..
      dockerfile: services/query-api/Dockerfile
    container_name: cascade-query-api
    profiles: ['apps']
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: production
      PORT: '3002'
      CASSANDRA_CONTACT_POINTS: cassandra-1,cassandra-2,cassandra-3
      CASSANDRA_PORT: '9042'
      CASSANDRA_LOCAL_DC: datacenter1
      CASSANDRA_CONSISTENCY: local_quorum
      REDIS_HOST: redis
      REDIS_PORT: '6379'
    depends_on:
      cassandra-3:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3002/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Aggregator — second, independent consumer of `raw-events` (ADR-0009/ADR-0015).
  # Derives read models: event counts in Cassandra (KAN-32) and the live
  # leaderboard in Redis sorted sets (KAN-34); funnels/retention are follow-ups.
  # Owns its own tables in the shared Postgres (raw `pg`, separate from
  # Project/Schema's Prisma-managed schema — ADR-0011/ADR-0015).
  # Horizontally scalable consumer (KAN-40): like the Ingestion-Processor, no
  # container_name / host-port binding so `--scale aggregator=N` runs N replicas in
  # the one `cascade-aggregator` group. Its views stay correct under rebalance/
  # redelivery because every write is idempotent/commutative (ADR-0016).
  aggregator:
    build:
      context: ..
      dockerfile: services/aggregator/Dockerfile
    profiles: ['apps']
    environment:
      NODE_ENV: production
      PORT: '3005'
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      CASSANDRA_CONTACT_POINTS: cassandra-1,cassandra-2,cassandra-3
      CASSANDRA_PORT: '9042'
      CASSANDRA_LOCAL_DC: datacenter1
      CASSANDRA_REPLICATION_FACTOR: '3'
      CASSANDRA_CONSISTENCY: local_quorum
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      AGGREGATOR_DEDUP_TTL_SECONDS: '86400'
      AGGREGATOR_LEADERBOARD_DAILY_TTL_SECONDS: '172800'
      DATABASE_URL: postgresql://cascade:cascade@postgres:5432/cascade
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      cassandra-3:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3005/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  cassandra-1-data:
  cassandra-2-data:
  cassandra-3-data:
  postgres-data:
