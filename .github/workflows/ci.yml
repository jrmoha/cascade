name: CI

# Gates every PR and push to main. The contract-compatibility checks here are
# the enforcement half of KAN-29 (ADR-0012): a breaking change to a shared
# contract fails this workflow rather than surfacing in production.
#   - proto:check  → committed ts-proto output must match `proto:gen` (a proto
#                    edit without regeneration, or any drift, fails).
#   - build        → `tsc --build` typechecks the whole graph; a removed/renamed
#                    contract field breaks every consumer that references it.
#   - test:ci      → unit tests incl. the JSON-Schema contract snapshot tripwire.
# Docker/Testcontainers integration + the smoke gate run locally
# (SKIP_INTEGRATION=1 here) to keep CI fast and deterministic.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # The Project/Schema service's @prisma/client types (Project, ApiKey,
      # EventSchema, Prisma.InputJsonObject) are produced by `prisma generate`,
      # not shipped by `npm ci`. Generate before build/test or `tsc --build`
      # can't resolve them. (Locally the service's own `build` does this.)
      - name: Generate Prisma client
        run: npm run prisma:generate -w @cascade/project-schema

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Contract codegen is up to date (proto)
        run: npm run proto:check

      - name: Typecheck & build
        run: npm run build

      - name: Test (unit + contract snapshot; integration gated off)
        run: npm run test:ci
        env:
          SKIP_INTEGRATION: '1'

  # Informational only (KAN-43, ADR-0021): runs the TypeScript 7 native compiler
  # (tsgo) over the same project graph as `verify`'s `tsc --build`. Kept
  # non-gating (`continue-on-error`) until typescript-eslint ships TS7 support
  # (TS 7.1) and we can make the native compiler the source of truth. `tsc`
  # remains the real gate; this job is a fast-feedback canary for TS7 drift.
  typecheck-native:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate -w @cascade/project-schema

      - name: Typecheck (native tsgo)
        run: npm run typecheck:native
